# DEFAULT: pure in-memory demo mode. The PostgreSQL driver is on the classpath, but Boot's
# DataSource auto-configuration is excluded here so the server starts without any database -
# AgentsGraphServer's demo engine bean provides the data. Switch to a real database with the
# 'db' profile (see application-db.properties):
#
#   ./gradlew :admin-server:bootRun --args='--spring.profiles.active=db'
#
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Allow the AgentsGraph UI dev server (npm start on :4200) to call the API cross-origin.
agentsgraph:
  web:
    cors-origins: http://localhost:4200
