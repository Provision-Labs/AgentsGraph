# DATABASE-BACKED MODE - activate with:
#
#   ./gradlew :admin-server:bootRun --args='--spring.profiles.active=db'
#
# Re-enables Boot's DataSource auto-configuration (excluded in the default in-memory mode); the
# admin-server auto-configuration then wires the three JDBC stores over it (schemas
# self-provisioned) and the demo in-memory beans back off automatically. Override any of these
# per environment (SPRING_DATASOURCE_URL=... etc.).
spring.autoconfigure.exclude=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/docscan
spring.datasource.username=docscan
spring.datasource.password=docscan
