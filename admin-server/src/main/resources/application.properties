# Pure in-memory mode (the default): no datasource - AgentsGraphServer defines its own
# AgentsGraphEngine.inMemory() bean and the starter contributes the admin API around it.

# Allow the AgentsGraph UI dev server (npm start on :4200) to call the API cross-origin.
agentsgraph.web.cors-origins=http://localhost:4200

# DATABASE-BACKED MODE instead: uncomment spring-boot-starter-jdbc + the driver in this module's
# build.gradle and point at your database - the demo in-memory beans back off automatically and
# the starter auto-configures the JDBC stores (schemas self-provisioned), engine and API:
#spring.datasource.url=jdbc:postgresql://localhost:5432/docscan
#spring.datasource.username=docscan
#spring.datasource.password=secret
# ...or a zero-install in-memory H2 database that still exercises the real JDBC stores:
#spring.datasource.url=jdbc:h2:mem:agentsgraph;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
#spring.datasource.username=sa
