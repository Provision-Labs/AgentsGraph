# DEFAULT: pure in-memory demo mode. When no profile is set explicitly, the 'inmemory' profile
# activates (spring.profiles.default) and AgentsGraphDemo provides the engine + seeded flows.
# Running with --spring.profiles.active=db switches the whole demo off (AgentsGraphDemo is
# @Profile("inmemory")) and application-db.properties takes over:
#
#   ./gradlew :admin-server:bootRun --args='--spring.profiles.active=db'
#
spring.profiles.default=inmemory

# The PostgreSQL driver is on the classpath, but in the in-memory mode Boot must not try to
# build a DataSource (there is no database) - the 'db' profile re-enables this.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Allow the AgentsGraph UI dev server (npm start on :4200) to call the API cross-origin.
agentsgraph.web.cors-origins=http://localhost:4200
